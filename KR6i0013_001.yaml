body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳法大師臣施護奉詔譯如是我聞一時佛在王舍城鷲峯山中與大苾芻衆五萬五千俱胝一心行菩提行無能勝菩薩等八萬百千無數俱胝那臾多諸天人等百千那臾多爾時世尊於其食時著衣持鉢與苾芻衆并諸菩薩天龍神等恭敬圍繞入王舍大城於彼乞食是時頻婆娑羅王子名寶月童子因為事故乘大龍象出王舍大城遙見世尊即下龍象而詣佛所到已致敬頭面禮足住立一面寶月童子白佛言如來應供正等正覺唯願世尊説彼十方如來所有名號若有信心善男子善女人聞是名已所有五逆等罪及一切業障悉皆消除於無上正等正覺速得不退爾時世尊告寶月童子言善哉善哉汝能樂聞如來名號之義此意賢善一切罪業決定消除童子汝今諦聽善思念之我為汝説童子過於東方百千俱胝那臾多恆河沙等佛剎彼有世界名曰無憂彼有如來名賢吉祥應供等正覺少病少惱乃至為諸衆生恆説妙法彼佛壽命六萬百千俱胝那臾多無數劫彼世界中無其日月晝夜唯有佛光普照一切及照地獄傍生焰魔羅界一切衆生令得解脫無量衆生得無生法忍佛言童子南方過百千俱胝那臾多恆河沙等佛剎彼有世界名曰寂靜彼有如來名無邊光應供正等正覺為諸衆生恆説妙法佛言童子西方過百千俱胝那臾多恆河沙等佛剎彼有世界名曰歡喜彼有如來名喜吉祥應供正等正覺為諸衆生恆説妙法佛言童子北方過百千俱胝那臾多恆河沙等佛剎彼有世界名曰不動彼有如來名曰寶幢應供正等正覺為諸衆生恆説妙法佛言童子東南方過百千俱胝那臾多恆河沙等佛剎彼有世界名曰正行彼有如來名曰無憂吉祥應供正等正覺為諸衆生恆説妙法佛言童子西南方過百千俱胝那臾多恆河沙等佛剎彼有世界名曰寶幢吉祥彼有如來名曰寶幢應供正等正覺為諸衆生恆説妙法佛言童子西北方過百千俱胝那臾多恆河沙等佛剎彼有世界名曰妙聲彼有如來名吉祥花應供正等正覺為諸衆生恆説妙法佛言童子東北方過百千俱胝那臾多恆河沙等佛剎彼有世界名曰安樂彼有如來名蓮華光嬉戲智應供正等正覺為諸衆生恆説妙法佛言童子下方過百千俱胝那臾多恆河沙等佛剎彼有世界名曰廣大彼有如來名光明吉祥應供正等正覺為諸衆生恆説妙法佛言童子上方過百千俱胝那臾多恆河沙等佛剎彼有世界名為月光彼有如來名財吉祥應供正等正覺為諸衆生恆説妙法童子如是一切世界佛剎皆有清淨旃檀樓閣所有如來名號若人聞已恭敬受持書寫讀誦廣為人説所有五逆等一切罪業悉皆消除亦不墮地獄傍生焰魔羅界於無上正等正覺速得不退於意云何童子於過去大無數及廣大無邊無數劫時有世界名曰寶生彼有如來名精進吉祥應供正等正覺彼十如來於精進吉祥佛所為菩薩位於其佛前供養發願我等各於佛剎成無上正等正覺之時若有衆生經剎那間至須臾之間聞我十佛名號聞已恭敬受持書寫讀誦廣為人説所有五逆等一切罪業悉皆消除亦不墮地獄傍生焰魔羅界於無上正等正覺速得不退爾時寶月童子如是聞已而復白言世尊彼佛如來壽量云何世尊答言彼佛壽十阿僧祇百千俱胝那臾多世界微塵等劫童子聞已白佛言彼佛如來甚為希有如是悲心發願為諸衆生得此壽量佛言童子若有衆生聞此十佛名號恭敬受持書寫讀誦信樂修行所有無量無邊福德悉得具足三業之罪亦不能生童子若有善男子善女人於恆河沙等佛剎滿中七寶供養如來經百千歲獲福無量若善男子善女人聞是十佛名號恭敬信受書寫讀誦為他解説所得福德勝前供養無量無邊爾時索河世界主大梵天王帝釋天子四天大王穌枲麼天子大自在天子以最上旃檀香粖散世尊前而為供養白世尊言若有衆生於此正法書寫讀誦信解受持得一切天人阿修羅尊重禮拜所有地獄畜生焰魔羅界阿修羅身及餓鬼趣皆得解脫佛言若此正法耳根得聞受持讀誦罪惡魔冤不能侵害於阿耨多羅三藐三菩提速得不退爾時世尊而説頌曰持此世尊十名號如是壽命俱胝劫佛説功德不思議未來成就二足尊爾時頻婆娑羅王寶月童子白於世尊而説伽他曰大無畏善説無邊無量佛衆生最上師我今歸命禮如是今修學一切佛知見願斷於煩惱速成於菩提爾時童子説此頌已白世尊言我今如是所有忍辱菩薩大智總持法門方廣之教佛菩提行如是修學行菩提行爾時世尊復説頌曰若人受持佛名號水火盜賊不能侵毒藥刀杖王難等一切諸苦自消除如是速得於菩提廣令流布佛名號若此正法於末世時有人受持讀誦此人命終速成佛道若以香花供養一切諸佛經多劫時不如有人於此正法暫時書寫讀誦所得福德無量無邊若人以最上所愛七寶滿於一切剎土之中供養一切諸佛亦不如讀誦此經得福甚多佛説此經時無量百千俱胝那臾多衆生發阿耨多羅三藐三菩提心無量無邊衆生得無生忍不退轉於阿耨多羅三藐三菩提佛説是語時寶月童子等皆大歡喜作禮而退
